<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPJ BEEP TEST</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        /* Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: #7BAFD4; /* Tar Heel Blue */
            overflow: hidden;
            user-select: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top 2/3: Title and Logo */
        .top-section {
            height: 66.66%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .title-box {
            background-color: black;
            padding: 20px 50px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #FF0000; /* Bold Red */
            font-size: 4.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo-placeholder {
            width: 262.5px; /* 75% bigger than 150px */
            height: 262.5px;
            border: 3px dashed rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Bottom 1/3: Runner and Button */
        .bottom-section {
            height: 33.33%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .track {
            position: absolute;
            top: 10%;
            width: 80%;
            height: 60px;
        }

        .runner {
            position: absolute;
            font-size: 3.5rem;
            /* 10s total loop (5s right, 5s left) */
            animation: 
                move-runner 10s linear infinite,
                flip-runner 10s steps(1) infinite;
        }

        /* Movement Logic */
        @keyframes move-runner {
            0%, 100% { left: 0%; }
            50% { left: 100%; transform: translateX(-100%); }
        }

        /* Orientation Logic (No moonwalking) */
        @keyframes flip-runner {
            0%, 49.9% { transform: scaleX(-1); }   /* Facing Left while moving Right */
            50%, 99.9% { transform: scaleX(1); }    /* Facing Right while moving Left */
        }

        .next-button {
            padding: 22px 90px;
            font-size: 2rem;
            font-weight: 900;
            color: #7BAFD4;
            background-color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
            z-index: 10;
            margin-top: 50px;
        }

        .next-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body onclick="initAudio()">

    <div class="container">
        <div class="top-section">
            <div class="title-box">
                <h1>MPJ BEEP TEST</h1>
            </div>
            
            <div class="logo-placeholder">
                <img src="Jags logo.png" alt="LOGO" style="max-width: 90%; max-height: 90%;">
                <div style="position: absolute; color: white; font-size: 0.8rem; bottom: -25px;">[75% Enlarged Logo Area]</div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="track">
                <div class="runner">🏃</div>
            </div>
            <button class="next-button" onclick="window.location.href='categories.html'">NEXT</button>
        </div>
    </div>

    <script>
        let audioCtx;
        let audioStarted = false;

        function playBeep() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'square';
            oscosc.frequency.setValueAtTime(800, audioCtx.currentTime); // High sharp beep
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function initAudio() {
            if (!audioStarted) {
                audioStarted = true;
                // Play first beep immediately
                playBeep();
                // Play beep every 5 seconds to match the runner hitting the sides
                setInterval(playBeep, 5000);
            }
        }
    </script>
</body>
</html>
